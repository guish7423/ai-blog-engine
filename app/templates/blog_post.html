<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ post.title }} — AI Blog Engine</title>
<link rel="stylesheet" href="/static/style.css">
<style>
  .post-header { margin-bottom: 2rem; }
  .post-header h1 { font-size: 2rem; margin: 0 0 .75rem; line-height: 1.3; }
  .post-meta { color: #888; font-size: .9rem; margin-bottom: .5rem; }
  .post-tags { display: flex; flex-wrap: wrap; gap: .4rem; margin-bottom: 1.5rem; }
  .tag { background: #2a2a3e; color: #aaa; padding: 2px 10px; border-radius: 99px; font-size: .75rem; }
  .post-body { line-height: 1.8; color: #ccc; }
  .post-body h2 { font-size: 1.4rem; margin: 2rem 0 .75rem; color: #e0e0e0; }
  .post-body h3 { font-size: 1.15rem; margin: 1.5rem 0 .5rem; color: #e0e0e0; }
  .post-body p { margin: 0 0 1rem; }
  .post-body ul, .post-body ol { margin: 0 0 1rem; padding-left: 1.5rem; }
  .post-body li { margin-bottom: .3rem; }
  .nav-back { display: block; margin-bottom: 1.5rem; color: #6366f1; text-decoration: none; }
  .nav-back:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <a href="/blog" class="nav-back">← Back to Blog</a>

  <article class="post-body">
    <div class="post-header">
      <h1>{{ post.title }}</h1>
      <div class="post-meta">
        <span>{{ post.created_at[:10] }}</span>
        <span>·</span>
        <span>{{ post.read_time }} min read</span>
        <span>·</span>
        <span>{{ post.word_count }} words</span>
      </div>
      <div class="post-tags">
        {% for tag in post.tags %}
        <span class="tag">{{ tag }}</span>
        {% endfor %}
      </div>
    </div>

    {{ post.content_html | safe }}
  </article>

  <footer style="margin-top:3rem;">
    <p><a href="/" style="color:#6366f1;">✨ Generate Your Own Post</a> · <a href="/pricing" style="color:#6366f1;">Pricing</a></p>
  </footer>
</div>
</body>
</html>
